<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ResumeTube</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header class="header">
      <img src="../icons/icon.svg" width="36" height="36" alt="">
      <div>
        <h1>ResumeTube</h1>
        <p>Transcripción lista para tu IA</p>
      </div>
    </header>

    <main>
      <section class="card controls" aria-labelledby="configuration-title">
        <h2 id="configuration-title">Configuración</h2>

        <label>
          Abrir en
          <select id="provider">
            <option value="chatgpt">ChatGPT</option>
            <option value="claude">Claude</option>
            <option value="aistudio">Google AI Studio</option>
            <option value="gemini">Gemini</option>
          </select>
        </label>

        <div class="two-columns">
          <label>
            Idioma
            <select id="language">
              <option value="es">Español</option>
              <option value="en">Inglés</option>
              <option value="source">Idioma original</option>
            </select>
          </label>

          <label>
            Detalle
            <select id="detail">
              <option value="brief">Breve</option>
              <option value="medium">Medio</option>
              <option value="detailed">Detallado</option>
            </select>
          </label>
        </div>

        <label>
          Formato
          <select id="format">
            <option value="summary">Resumen y puntos clave</option>
            <option value="study">Apuntes de estudio</option>
            <option value="chapters">Capítulos con timestamps</option>
          </select>
        </label>

        <label class="checkbox-row">
          <input id="timestamps" type="checkbox" checked>
          Conservar marcas de tiempo
        </label>
      </section>

      <section id="status" class="status" role="status" aria-live="polite">
        Abre un vídeo de YouTube para comenzar.
      </section>

      <section id="transcript-info" class="card transcript-info" hidden>
        <strong id="video-title"></strong>
        <span id="transcript-stats"></span>
      </section>

      <section id="manual-section" class="card manual" hidden>
        <label for="manual-transcript">Pega aquí la transcripción</label>
        <textarea
          id="manual-transcript"
          rows="7"
          placeholder="Pega la transcripción que aparece en YouTube…"
        ></textarea>
        <button id="use-manual" class="button secondary" type="button">
          Usar este texto
        </button>
      </section>

      <div class="actions">
        <button id="extract" class="button secondary" type="button">
          Obtener transcripción
        </button>
        <button id="copy-open" class="button primary" type="button">
          Copiar y abrir chat
        </button>
      </div>

      <div class="footer-actions">
        <button id="toggle-manual" class="link-button" type="button">
          Pegar transcripción manualmente
        </button>
        <button id="copy-only" class="link-button" type="button" disabled>
          Copiar sin abrir
        </button>
      </div>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
